# Monthly in-range dependency refresh. Templates deploy games with
# --frozen-lockfile, so a game is pinned to whatever this repo's lockfile
# held when the game was generated — without this cron the templates (and
# every new game) silently age. Updates to LATEST (majors included) — the
# build step gates the commit, so a breaking release fails the run (visibly)
# instead of landing. If an engine major changes its API, update the VibeCode
# agent's ENGINE_GUIDES entry alongside fixing the template.
name: Update dependencies
on:
  schedule:
    - cron: "0 4 1 * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm up -r --latest
      - run: pnpm build
      - name: Commit refreshed lockfile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || { git commit -m "chore: monthly dependency refresh (latest)"; git push; }
